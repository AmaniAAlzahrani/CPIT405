<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Like System</title>

<style>
body{
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg,#eef2ff,#f8fafc);
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:16px;
    width:420px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

#likeBtn{
    background:#dcfce7;
    color:#166534;
}

#dislikeBtn{
    background:#fee2e2;
    color:#991b1b;
}

#resetBtn{
    background:#111;
    color:white;
    margin-top:15px;
}

.input-area{
    display:flex;
    gap:10px;
    margin-top:20px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

#commentBtn{
    background:#6366f1;
    color:white;
}

#comments{
    margin-top:20px;
    text-align:left;
}

.comment-box{
    background:#f1f5f9;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>👍 Like / 👎 Dislike</h2>

<div class="buttons">
    <button id="likeBtn">👍 <span id="likeCount">0</span></button>
    <button id="dislikeBtn">👎 <span id="dislikeCount">0</span></button>
</div>

<div class="input-area">
    <input type="text" id="commentInput" placeholder="Write a comment...">
    <button id="commentBtn">Send</button>
</div>

<button id="resetBtn">Reset</button>

<div id="comments">
    <h3>Comments</h3>
</div>

</div>

<script>

/* ===== STORAGE ===== */
let likeCount = parseInt(localStorage.getItem("like")) || 0;
let dislikeCount = parseInt(localStorage.getItem("dislike")) || 0;
let comments = JSON.parse(localStorage.getItem("comments")) || [];
let voted = localStorage.getItem("voted"); // منع السبام

/* ===== INIT ===== */
document.getElementById("likeCount").innerText = likeCount;
document.getElementById("dislikeCount").innerText = dislikeCount;

function renderComments(){
    const box = document.getElementById("comments");
    box.innerHTML = "<h3>Comments</h3>";

    comments.forEach(c=>{
        let div = document.createElement("div");
        div.className = "comment-box";
        div.innerHTML = `<b>${c.text}</b><br><small>${c.time}</small>`;
        box.appendChild(div);
    });
}

renderComments();

/* ===== LIKE ===== */
document.getElementById("likeBtn").onclick = ()=>{
    if(voted) return alert("You already voted!");

    likeCount++;
    localStorage.setItem("like", likeCount);
    localStorage.setItem("voted", "yes");

    document.getElementById("likeCount").innerText = likeCount;
};

/* ===== DISLIKE ===== */
document.getElementById("dislikeBtn").onclick = ()=>{
    if(voted) return alert("You already voted!");

    dislikeCount++;
    localStorage.setItem("dislike", dislikeCount);
    localStorage.setItem("voted", "yes");

    document.getElementById("dislikeCount").innerText = dislikeCount;
};

/* ===== COMMENT ===== */
document.getElementById("commentBtn").onclick = ()=>{
    let text = document.getElementById("commentInput").value;

    if(text.trim() === "") return alert("Write something!");

    let newComment = {
        text: text,
        time: new Date().toLocaleString()
    };

    comments.push(newComment);
    localStorage.setItem("comments", JSON.stringify(comments));

    document.getElementById("commentInput").value = "";
    renderComments();
};

/* ===== RESET ===== */
document.getElementById("resetBtn").onclick = ()=>{
    localStorage.clear();

    likeCount = 0;
    dislikeCount = 0;
    comments = [];

    document.getElementById("likeCount").innerText = 0;
    document.getElementById("dislikeCount").innerText = 0;

    renderComments();

    alert("Reset done!");
};

</script>

</body>
</html>
