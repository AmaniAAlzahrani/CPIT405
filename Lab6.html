<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Like System</title>

<style>
body{
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg,#eef2ff,#f8fafc);
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:16px;
    width:420px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
    text-align:center;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

#likeBtn{
    background:#dcfce7;
    color:#166534;
}

#dislikeBtn{
    background:#fee2e2;
    color:#991b1b;
}

#resetBtn{
    background:#111;
    color:white;
    margin-top:15px;
}

.input-area{
    display:flex;
    gap:10px;
    margin-top:10px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

#commentBtn{
    background:#6366f1;
    color:white;
}

#comments{
    margin-top:10px;
    text-align:left;
}

.comment-box{
    background:#f1f5f9;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    font-size:14px;
}

.back-link{
    position: fixed;
    bottom: 20px;
    left: 20px;
    text-decoration: none;
    color: #4f46e5;
    font-weight: bold;
}

.back-link:hover{
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<h2>👍 Like / 👎 Dislike</h2>

<div class="buttons">
    <button id="likeBtn">👍 <span id="likeCount">0</span></button>
    <button id="dislikeBtn">👎 <span id="dislikeCount">0</span></button>
</div>

<h3 style="margin-top:20px;">Comments</h3>

<div class="input-area">
    <input type="text" id="commentInput" placeholder="Write a comment...">
    <button id="commentBtn" type="button">Send</button>
</div>

<div id="comments"></div>

<button id="resetBtn">Reset</button>

</div>

<a href="index.html" class="back-link">⬅ Back to Portfolio</a>

<script>

/* ===== STORAGE ===== */
let likeCount = parseInt(localStorage.getItem("like")) || 0;
let dislikeCount = parseInt(localStorage.getItem("dislike")) || 0;
let comments = JSON.parse(localStorage.getItem("comments")) || [];
let vote = localStorage.getItem("vote"); // like / dislike

/* ===== INIT ===== */
document.getElementById("likeCount").innerText = likeCount;
document.getElementById("dislikeCount").innerText = dislikeCount;

/* ===== RENDER COMMENTS ===== */
function renderComments(){
    const box = document.getElementById("comments");
    box.innerHTML = "";

    comments.forEach(c=>{
        let div = document.createElement("div");
        div.className = "comment-box";
        div.innerHTML = `<b>${c.text}</b><br><small>${c.time}</small>`;
        box.appendChild(div);
    });
}

renderComments();

/* ===== LIKE ===== */
document.getElementById("likeBtn").onclick = ()=>{

    if(vote === "like"){
        return alert("You already liked!");
    }

    if(vote === "dislike"){
        return alert("You already disliked! Press Reset to change.");
    }

    likeCount++;
    localStorage.setItem("like", likeCount);

    vote = "like";
    localStorage.setItem("vote", vote);

    document.getElementById("likeCount").innerText = likeCount;
};

/* ===== DISLIKE ===== */
document.getElementById("dislikeBtn").onclick = ()=>{

    if(vote === "dislike"){
        return alert("You already disliked!");
    }

    if(vote === "like"){
        return alert("You already liked! Press Reset to change.");
    }

    dislikeCount++;
    localStorage.setItem("dislike", dislikeCount);

    vote = "dislike";
    localStorage.setItem("vote", vote);

    document.getElementById("dislikeCount").innerText = dislikeCount;
};

/* ===== COMMENT ===== */
document.getElementById("commentBtn").onclick = ()=>{
    let text = document.getElementById("commentInput").value;

    if(text.trim() === "") return alert("Write something!");

    let newComment = {
        text: text,
        time: new Date().toLocaleString()
    };

    comments.push(newComment);
    localStorage.setItem("comments", JSON.stringify(comments));

    document.getElementById("commentInput").value = "";
    renderComments();
};

/* ===== RESET ===== */
document.getElementById("resetBtn").onclick = ()=>{
    localStorage.clear();

    likeCount = 0;
    dislikeCount = 0;
    comments = [];
    vote = null;

    document.getElementById("likeCount").innerText = 0;
    document.getElementById("dislikeCount").innerText = 0;

    renderComments();

    alert("Reset done!");
};

</script>

</body>
</html>
