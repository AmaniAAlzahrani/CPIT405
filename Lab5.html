
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBA Player Stats Dashboard</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f4f4f4;
    transition:0.3s;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
}

/* Controls */
.controls{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

input, select, button{
    padding:10px;
    font-size:16px;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th, td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

th{
    background:#222;
    color:white;
    cursor:pointer;
}

tr:hover{
    background:#f1f1f1;
}

/* Dark Mode */
.dark{
    background:#121212;
    color:white;
}

.dark table{
    background:#1e1e1e;
    color:white;
}

.dark th{
    background:#333;
}
</style>
</head>

<body>

<div class="container">

<h1>NBA Player Stats Dashboard</h1>

<!-- CONTROLS -->
<div class="controls">
<input type="text" id="search" placeholder="Search player...">

<select id="teamFilter">
<option value="all">All Teams</option>
<option value="Lakers">Lakers</option>
<option value="Warriors">Warriors</option>
<option value="Bucks">Bucks</option>
<option value="Mavericks">Mavericks</option>
</select>

<button id="darkBtn">Dark Mode</button>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Name</th>
<th>Team</th>
<th id="pointsSort">Points ▲▼</th>
<th>Assists</th>
<th>Rebounds</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<script>

/* ================= DATA ================= */
const players = [
{name:"LeBron James", team:"Lakers", points:27, assists:7, rebounds:8},
{name:"Stephen Curry", team:"Warriors", points:30, assists:6, rebounds:5},
{name:"Giannis Antetokounmpo", team:"Bucks", points:29, assists:5, rebounds:11},
{name:"Luka Doncic", team:"Mavericks", points:32, assists:8, rebounds:9},
{name:"Anthony Davis", team:"Lakers", points:24, assists:3, rebounds:10},
{name:"Klay Thompson", team:"Warriors", points:21, assists:2, rebounds:4}
];

let currentData = [...players];
let ascending = true;

/* ================= DISPLAY ================= */
function displayPlayers(data){
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    data.forEach(player=>{
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${player.name}</td>
            <td>${player.team}</td>
            <td>${player.points}</td>
            <td>${player.assists}</td>
            <td>${player.rebounds}</td>
        `;

        tableBody.appendChild(row);
    });
}

displayPlayers(currentData);

/* ================= SEARCH ================= */
document.getElementById("search").addEventListener("input", function(){
    const keyword = this.value.toLowerCase();

    currentData = players.filter(p =>
        p.name.toLowerCase().includes(keyword)
    );

    displayPlayers(currentData);
});

/* ================= FILTER ================= */
document.getElementById("teamFilter").addEventListener("change", function(){

    const team = this.value;

    if(team === "all"){
        currentData = [...players];
    } else {
        currentData = players.filter(p => p.team === team);
    }

    displayPlayers(currentData);
});

/* ================= DARK MODE ================= */
document.getElementById("darkBtn").addEventListener("click", function(){
    document.body.classList.toggle("dark");
});

/* ================= SORT ================= */
document.getElementById("pointsSort").addEventListener("click", function(){

    currentData.sort((a,b)=>
        ascending ? a.points - b.points : b.points - a.points
    );

    ascending = !ascending;

    displayPlayers(currentData);
});

</script>
<a href="index.html">⬅ Back to Portfolio</a>
</body>
</html>
