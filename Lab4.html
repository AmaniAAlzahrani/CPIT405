<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lab 4 - Order Form</title>

<style>

body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

h1 {
    margin-left: 40px;
}

form {
    width: 600px;
    margin-left: 40px;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
}

textarea {
    height: 150px;
    resize: vertical;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background-color: black;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
}

button:hover {
    background-color: #333;
}

footer {
    background-color: #1e90ff;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 40px;
}

</style>
</head>

<body>

<h1>Great Auto Parts - Order Form</h1>

<form>

<label>First Name:</label>
<input type="text" placeholder="Enter your first name">

<label>Last Name:</label>
<input type="text" placeholder="Enter your last name">

<label>Email:</label>
<input type="email" placeholder="Enter your email address">

<label>Phone number:</label>
<input type="tel" placeholder="Enter your phone number">

<label>Make:</label>
<input type="text" placeholder="Make">

<label>Model:</label>
<input type="text" placeholder="Model">

<label>Year:</label>
<input type="number" placeholder="Year">

<label>Date:</label>
<input type="date">

<label>Spare Part:</label>
<input type="text" placeholder="Enter the spare part you need">

<label>Quantity:</label>
<input type="number" placeholder="Enter the quantity of the spare part you need">

<label>Comment:</label>
<textarea placeholder="Enter your comment"></textarea>

<button type="submit">Submit</button>

</form>

<footer>
    CPIT-405 Internet Applications <br>
    Department of Information Technology
</footer>

<br><br>
 <a href="index.html">⬅ Back to Portfolio</a>

</body>
</html>
