

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unsplash API Lab</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    margin: 0;
}

.container {
    width: 90%;
    margin: auto;
    padding-top: 20px;
}

h1 {
    text-align: center;
}

.search-bar {
    display: flex;
    gap: 10px;
    margin: 20px 0;
}

input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    padding: 10px 15px;
    border: none;
    background: #333;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #555;
}

#images {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
    gap: 15px;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.info {
    padding: 10px;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="container">

<h1>Unsplash API</h1>

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search images...">
    <button onclick="searchXHR()">Search using XHR</button>
    <button onclick="searchFetch()">Search using Fetch</button>
    <button onclick="searchAsync()">Search using Async/Await</button>
</div>

<div id="images"></div>

</div>

<script>

const ACCESS_KEY = "YOUR_ACCESS_KEY";

// عرض الصور
function displayImages(results){
    const container = document.getElementById("images");
    container.innerHTML = "";

    results.forEach(photo => {
        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = photo.urls.small;

        const info = document.createElement("div");
        info.className = "info";
        info.innerText = "📸 " + photo.user.name;

        // mouse event
        img.addEventListener("click", () => {
            window.open(photo.links.html);
        });

        card.appendChild(img);
        card.appendChild(info);
        container.appendChild(card);
    });
}

// XHR
function searchXHR(){
    const query = document.getElementById("searchInput").value;
    const xhr = new XMLHttpRequest();

    xhr.open("GET", `https://api.unsplash.com/search/photos?query=${query}`);
    xhr.setRequestHeader("Authorization", `Client-ID ${ACCESS_KEY}`);

    xhr.onload = () => {
        const data = JSON.parse(xhr.responseText);
        displayImages(data.results);
    };

    xhr.send();
}

// Fetch (Promise)
function searchFetch(){
    const query = document.getElementById("searchInput").value;

    fetch(`https://api.unsplash.com/search/photos?query=${query}`, {
        headers: { Authorization: `Client-ID ${ACCESS_KEY}` }
    })
    .then(res => res.json())
    .then(data => displayImages(data.results));
}

// Async/Await
async function searchAsync(){
    const query = document.getElementById("searchInput").value;

    const res = await fetch(`https://api.unsplash.com/search/photos?query=${query}`, {
        headers: { Authorization: `Client-ID ${ACCESS_KEY}` }
    });

    const data = await res.json();
    displayImages(data.results);
}

// keyboard event
document.getElementById("searchInput").addEventListener("keypress", e=>{
    if(e.key === "Enter"){
        searchAsync();
    }
});

</script>

</body>
</html>
